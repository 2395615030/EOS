name: EmotionOS Build

on:
  push:
    branches: [ "master" ]
    paths-ignore:
      - 'docs/**'
      - 'README.md'
      - '.gitignore'
  pull_request:
    branches: [ "master" ]

jobs:
  # ===== Stable Build: MSYS2/MinGW (i686) =====
  build:
    runs-on: windows-latest
    name: Build
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW32
          install: mingw-w64-i686-gcc
          update: false

      - name: Show compiler
        run: |
          g++ --version
          echo "CXXFLAGS: -std=c++17 -I include -I src"

      - name: Build EmotionOS
        run: |
          mkdir -p build
          g++ -std=c++17 -O2 -I include -I src src/kernel.cpp src/main.cpp -o build/emotionos.exe -static -v 2>&1 | tail -20

      - name: Smoke test
        run: |
          echo "=== Smoke Test ==="
          printf 'version\nstats\nps\nquit\n' | timeout 5 ./build/emotionos.exe 2>&1 | head -30 || echo "smoke test exit: $?"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: EmotionOS
          path: build/emotionos.exe
          compression-level: 9
